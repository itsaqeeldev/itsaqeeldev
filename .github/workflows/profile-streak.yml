name: Profile Streak Card

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate streak SVG
        env:
          GH_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_USERNAME: itsaqeeldev
        run: node scripts/generate-streak-card.js


      - name: Commit SVG
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add assets/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update profile streak card"

          git pull --rebase origin main
          git push origin HEAD:main


